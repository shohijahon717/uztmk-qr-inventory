<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>QR Print</title>

    <style>
        @page {
            size: A4;
            margin: 10mm;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: white;
        }

        .topbar {
            padding: 20px;
            text-align: center;
        }

        .print-btn {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .print-btn:hover {
            background: #0b5ed7;
        }

        .sheet {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10mm;
            padding: 10mm;
            justify-items: center;
        }

        .qr-card {
            width: 6cm;
            height: 7.2cm;
            border: 2px solid #000;
            border-radius: 12px;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
            background: white;
            page-break-inside: avoid;
        }

        .logo {
            width: 75px;
            margin-bottom: 4px;
        }

        .inv-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .qr-image {
            width: 4cm;
            height: 4cm;
            object-fit: contain;
            border: 2px solid #000;
            padding: 4px;
        }

        @media print {

            .topbar {
                display: none;
            }

            body {
                margin: 0;
            }

            .sheet {
                padding: 0;
                gap: 8mm;
            }

            .qr-card {
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>

<div class="topbar">
    <button onclick="window.print()" class="print-btn">
        🖨 Chop Etish
    </button>
</div>

<div class="sheet">

    {% for device in devices %}
    <div class="qr-card">

        <!-- TMK Logo -->
        <img
            src="/static/images/tmk-logo.png"
            alt="TMK"
            class="logo"
        >

        <!-- Inventar -->
        <div class="inv-text">
            INV № {{ device.inventory_number }}
        </div>

        <!-- QR -->
        <img
            src="{{ device.qr_code.url }}"
            alt="QR"
            class="qr-image"
        >

    </div>
    {% endfor %}

</div>

</body>
</html>
