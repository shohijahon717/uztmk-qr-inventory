<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-card{
            width:100%;
            max-width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

    </style>
</head>
<body>

<div class="login-card">

    <h2 class="fw-bold mb-4 text-center">
        UZTMK Inventory
    </h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>Username</label>

            <input
                type="text"
                name="username"
                class="form-control"
                required
            >

        </div>

        <div class="mb-4">

            <label>Password</label>

            <input
                type="password"
                name="password"
                class="form-control"
                required
            >
            
        </div>

        <button class="btn btn-dark w-100">

            Login

        </button>

    </form>

</div>

</body>
</html>
